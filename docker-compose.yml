services:
  kafka:
    image: bitnami/kafka:3.7
    container_name: kafka
    restart: unless-stopped
    environment:
      KAFKA_ENABLE_KRAFT: "yes"
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12

  gw-exchanger:
    build:
      context: ./gw-exchanger
      dockerfile: Dockerfile
    container_name: gw-exchanger
    restart: unless-stopped
    environment:
      GRPC_HOST: 0.0.0.0
      GRPC_PORT: 50051
      POSTGRES_HOST: exchanger-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: exchange
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_SSLMODE: disable
      POSTGRES_MAX_OPEN_CONNS: 20
      POSTGRES_MAX_IDLE_CONNS: 10
      RUN_MIGRATIONS: true
      MIGRATIONS_DIR: /app/migrations
      LOG_LEVEL: debug
    ports:
      - "50051:50051"
    depends_on:
      exchanger-db:
        condition: service_healthy

  gw-currency-wallet:
    build:
      context: ./gw-currency-wallet
      dockerfile: Dockerfile
    container_name: gw-currency-wallet
    restart: unless-stopped
    environment:
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: 8080
      HTTP_ACCESS_LOG: true
      POSTGRES_HOST: wallet-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: wallet
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_SSLMODE: disable
      POSTGRES_MAX_OPEN_CONNS: 20
      POSTGRES_MAX_IDLE_CONNS: 10
      JWT_SECRET: local-dev-secret
      JWT_TOKEN_TTL_MINUTES: 60
      EXCHANGER_GRPC_HOST: gw-exchanger
      EXCHANGER_GRPC_PORT: 50051
      EXCHANGER_GRPC_REQUEST_TIMEOUT_MS: 3000
      KAFKA_BROKERS: kafka:9092
      KAFKA_OPERATIONS_TOPIC: wallet.operations
      KAFKA_LARGE_OPERATIONS_TOPIC: wallet.large-operations
      LARGE_OPERATION_THRESHOLD_RUB_MINOR: 3000000
      RUN_MIGRATIONS: true
      MIGRATIONS_DIR: /app/migrations
      LOG_LEVEL: debug
    ports:
      - "8080:8080"
    depends_on:
      wallet-db:
        condition: service_healthy
      gw-exchanger:
        condition: service_started
      kafka:
        condition: service_healthy

  gw-notification:
    build:
      context: ./gw-notification
      dockerfile: Dockerfile
    container_name: gw-notification
    restart: unless-stopped
    environment:
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: wallet.large-operations
      KAFKA_GROUP_ID: gw-notification
      KAFKA_MIN_BYTES: 1
      KAFKA_MAX_BYTES: 10485760
      KAFKA_MAX_WAIT_MS: 500
      KAFKA_BATCH_SIZE: 128
      KAFKA_BATCH_WAIT_MS: 50
      MONGO_URI: ""
      MONGO_HOST: notification-mongo
      MONGO_PORT: 27017
      MONGO_USER: mongo
      MONGO_PASSWORD: mongo
      MONGO_AUTH_SOURCE: admin
      MONGO_DB: notification
      MONGO_COLLECTION: large_operations
      MONGO_CONNECT_TIMEOUT_MS: 5000
      LOG_LEVEL: debug
    depends_on:
      kafka:
        condition: service_healthy
      notification-mongo:
        condition: service_healthy

  gw-analytics:
    build:
      context: ./gw-analytics
      dockerfile: Dockerfile
    container_name: gw-analytics
    restart: unless-stopped
    environment:
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: wallet.operations
      KAFKA_GROUP_ID: gw-analytics
      KAFKA_MIN_BYTES: 1
      KAFKA_MAX_BYTES: 10485760
      KAFKA_MAX_WAIT_MS: 500
      KAFKA_BATCH_SIZE: 128
      KAFKA_BATCH_WAIT_MS: 50
      ELASTIC_ADDRESSES: http://elasticsearch:9200
      ELASTIC_USERNAME: ""
      ELASTIC_PASSWORD: ""
      ELASTIC_INDEX: wallet_operations
      LOG_LEVEL: debug
    depends_on:
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  exchanger-db:
    image: postgres:16-alpine
    container_name: exchanger-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: exchange
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - exchanger_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d exchange"]
      interval: 5s
      timeout: 3s
      retries: 10

  wallet-db:
    image: postgres:16-alpine
    container_name: wallet-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: wallet
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - wallet_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wallet"]
      interval: 5s
      timeout: 3s
      retries: 10

  notification-mongo:
    image: mongo:7.0
    container_name: notification-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongo
      MONGO_INITDB_ROOT_PASSWORD: mongo
    ports:
      - "27018:27017"
    volumes:
      - notification_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--username", "mongo", "--password", "mongo", "--authenticationDatabase", "admin", "--eval", "db.adminCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 12

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.3
    container_name: elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - analytics_elastic_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 18

  kibana:
    image: docker.elastic.co/kibana/kibana:9.3.3
    container_name: kibana
    restart: unless-stopped
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy

volumes:
  kafka_data:
  exchanger_db_data:
  wallet_db_data:
  notification_mongo_data:
  analytics_elastic_data:
